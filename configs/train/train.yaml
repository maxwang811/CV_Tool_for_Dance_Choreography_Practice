decisions_ref: docs/project_decisions.md

# Single training stage: pose estimation from scratch on AIST++ 2D keypoints
# paired with frames extracted from data/raw_videos/. No COCO, no CrowdPose,
# no pretrained weights (see docs/project_decisions.md sections 1 and 6).

stage: aist_only
data_config: configs/data/pose_train.yaml
model_config: configs/model/simple_baseline.yaml   # switch to hrnet_w32.yaml for the final run
output_dir: data/processed/train

dataset_mix:
  aistpp: 1.0

epochs: 150
batch_size: 64
num_workers: 6
optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1.0e-6

loss:
  name: joint_mse_with_visibility
  use_target_weight: true

eval_every_n_epochs: 2
save_every_n_epochs: 5
log_every_n_steps: 50

resume_from: null
init_from: null                 # random init, no pretrained weights
