decisions_ref: docs/project_decisions.md

# Unified pose-training data config.
# Training uses ONLY AIST++ 2D keypoints paired with data/raw_videos/.
# COCO and CrowdPose are intentionally disabled (see docs/project_decisions.md
# section 6). custom_dance_val is kept for optional hand-labeled evaluation.

input_size: [256, 192]      # [H, W]
heatmap_size: [64, 48]      # [H, W]
sigma: 2.0

datasets:
  coco:
    enabled: false
  crowdpose:
    enabled: false
  aistpp:
    enabled: true
    images_dir: data/raw_frames/aistpp
    annotations: data/labels/aistpp/internal_train.jsonl
    val_annotations: data/labels/aistpp/internal_val.jsonl
    frame_stride: 8          # sample every 8th frame (Phase 5.3)
  custom_dance_val:
    enabled: true
    images_dir: data/labels/custom_dance_val/images
    annotations: data/labels/custom_dance_val/internal_val.jsonl
    val_annotations: data/labels/custom_dance_val/internal_val.jsonl

augmentations:
  random_scale: [0.75, 1.25]
  random_rotation_deg: 40
  horizontal_flip_prob: 0.5
  translation_jitter_px: 20
  color_jitter:
    brightness: 0.25
    contrast: 0.25
    saturation: 0.25
  gaussian_blur_prob: 0.2
  motion_blur_prob: 0.1
  jpeg_quality: [55, 95]
  jpeg_prob: 0.3
  random_cutout_prob: 0.25
